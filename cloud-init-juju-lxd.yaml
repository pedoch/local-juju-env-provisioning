#cloud-config
#
# Container-aware cloud-init for LXD containers.
# Differs from the VM variant (cloud-init-juju.yaml) in the following ways:
#   - Uses classic MicroK8s (not strict) for container compatibility
#   - Skips host-kernel operations (swap, sysctl/IPv6) since containers
#     share the host kernel
#   - Explicitly uses the 'dir' storage backend for nested LXD
#   - Guards systemctl calls against services that may not exist in containers
---
package_update: true

snap:
  commands:
    - snap install microk8s --classic --channel 1.31/stable
    - snap alias microk8s.kubectl kubectl
    - snap alias microk8s.kubectl k
    - snap install --classic charmcraft
    - snap install --classic rockcraft
    - snap install juju --channel=3.6/candidate
    - snap refresh

runcmd:
  - DEBIAN_FRONTEND=noninteractive apt-get remove -y landscape-client landscape-common adwaita-icon-theme humanity-icon-theme
  - DEBIAN_FRONTEND=noninteractive apt-get -y upgrade
  - DEBIAN_FRONTEND=noninteractive apt-get -y autoremove

  - |
    # Disable unnecessary services (guard each call — some services
    # do not exist inside containers)
    for svc in \
      man-db.timer man-db.service \
      apport.service apport-autoreport.service \
      apt-daily.service apt-daily.timer \
      apt-daily-upgrade.service apt-daily-upgrade.timer \
      unattended-upgrades.service \
      motd-news.service motd-news.timer \
      ua-messaging.service ua-messaging.timer \
      ua-timer.timer ua-timer.service \
      systemd-tmpfiles-clean.timer; do
      systemctl disable "$svc" --now 2>/dev/null || true
    done

  - |
    # Set right owner to /home/ubuntu directory
    chown ubuntu:ubuntu /home/ubuntu

  - |
    # Make sure juju directory is there
    sudo -u ubuntu mkdir -p /home/ubuntu/.local/share/juju

  - |
    # Setup LXD for charmcraft and Juju.
    # Use 'dir' storage backend — it is the safest option for nested
    # containers (zfs/btrfs need kernel modules that may not be available).
    lxd init --auto --storage-backend=dir
    adduser ubuntu lxd

  - |
    # Setup microk8s (classic confinement — group is 'microk8s')
    sudo usermod -a -G microk8s ubuntu
    sudo -u ubuntu mkdir -p /home/ubuntu/.kube

    microk8s status --wait-ready

    # Color codes for output
    YELLOW='\033[1;33m'
    NC='\033[0m' # No Color

    # Wait for API server to be fully operational
    echo "Waiting for Kubernetes API server to be ready..."
    timeout=180
    elapsed=0
    until microk8s kubectl get nodes > /dev/null 2>&1; do
      if [ $elapsed -ge $timeout ]; then
        echo -e "${YELLOW}WARNING: Kubernetes API server failed to become ready after ${timeout} seconds${NC}"
        echo -e "${YELLOW}WARNING: Continuing anyway, but addons may fail to enable properly${NC}"
        break
      fi
      sleep 3
      elapsed=$((elapsed + 3))
      echo -n "."
    done
    echo ""
    if microk8s kubectl get nodes > /dev/null 2>&1; then
      echo "Kubernetes API server is ready!"
    else
      echo -e "${YELLOW}WARNING: Kubernetes API server check skipped due to timeout${NC}"
    fi

    # Enable registry with retry
    for attempt in 1 2 3; do
      echo "Enabling registry (attempt $attempt)..."
      microk8s.enable registry
      sleep 10

      # Check if registry is responding
      if curl -sf http://localhost:32000/v2/_catalog > /dev/null 2>&1; then
        echo "Registry is ready!"
        break
      fi

      # Retry if not the last attempt
      if [ $attempt -lt 3 ]; then
        echo "Registry not responding, retrying..."
        microk8s.disable registry || true
        sleep 5
      else
        echo -e "${YELLOW}WARNING: Registry failed after 3 attempts. May need manual fix.${NC}"
      fi
    done

    microk8s.enable metrics-server
    microk8s.kubectl rollout status deployments/metrics-server -n kube-system -w --timeout=600s

    # The dns addon will restart the api server so you may see a blip in the availability
    # Separating addons to avoid errors such as
    # dial tcp 127.0.0.1:16443: connect: connection refused
    microk8s.enable dns
    microk8s.enable storage
    microk8s.enable rbac
    microk8s.kubectl rollout status deployments/coredns -n kube-system -w --timeout=600s

    microk8s.enable hostpath-storage
    microk8s.enable ingress
    # wait for storage, ingress to become available
    microk8s.kubectl rollout status deployments/hostpath-provisioner -n kube-system -w --timeout=600s
    microk8s.kubectl rollout status daemonsets/nginx-ingress-microk8s-controller -n ingress -w --timeout=600s

  - |
    # Install Terraform, bootstrap Juju, create models/users, deploy services.
    # Shared script — single source of truth for both VM and container flows.
    bash /home/ubuntu/project/setup-juju-env.sh

final_message: "The system is finally up, after $UPTIME seconds"
